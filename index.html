<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imágenes Aleatorias</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            /* Fondo degradado suave para resaltar la aplicación */
            background: linear-gradient(135deg, #a1a1a1 0%, #4a4a4a 100%);
        }

        .app-window {
            background-color: #fcf9ee; /* Tono crema de la imagen */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 900px;
            width: 95%;
            border: 1px solid #d1cfc5;
        }

        h1 {
            color: #333;
            font-size: 2.5rem;
            margin: 0 0 5px 0;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .image-container {
            position: relative;
            background: #333;
            border-radius: 12px;
            padding: 10px; /* Marco oscuro alrededor de la foto */
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        img {
            width: 100%;
            display: block;
            border-radius: 5px;
            transition: opacity 0.4s ease;
            /* Aspect ratio HD */
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        .info-footer {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4a4538;
            background: linear-gradient(to bottom, #f0e9d2, #d6ceb5);
            border: 2px solid #b5ad96;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: linear-gradient(to bottom, #f5efe0, #e0d8c0);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* Estilo para las flechas de los botones */
        .arrow {
            font-size: 1.5rem;
            line-height: 0;
        }
    </style>
</head>
<body>

    <div class="app-window">
        <h1>Explorador de Fondos HD</h1>
        <div class="subtitle">DimenHD (1920x1080 pixels)</div>

        <div class="image-container">
            <img id="main-img" src="https://picsum.photos/1920/1080" alt="Cargando fondo...">
        </div>

        <div class="info-footer">Full HD (1920x1080 pixels)</div>

        <div class="controls">
            <button id="btn-prev" onclick="goBack()" disabled>
                <span class="arrow">❮</span> Anterior
            </button>
            <button id="btn-next" onclick="goForward()">
                Siguiente <span class="arrow">❯</span>
            </button>
        </div>
    </div>

    <script>
        // Historial para poder volver atrás
        let history = ["https://picsum.photos/1920/1080"];
        let currentIndex = 0;

        const imgElement = document.getElementById('main-img');
        const btnPrev = document.getElementById('btn-prev');

        function updateDisplay() {
            imgElement.style.opacity = '0.3'; // Efecto de carga
            
            // Cambiamos la fuente
            imgElement.src = history[currentIndex];

            imgElement.onload = () => {
                imgElement.style.opacity = '1';
            };

            // Habilitar/Deshabilitar botón anterior
            btnPrev.disabled = (currentIndex === 0);
        }

        function goForward() {
            // Si estamos al final del historial, generamos una nueva
            if (currentIndex === history.length - 1) {
                const newUrl = `https://picsum.photos/1920/1080?sig=${Math.random()}`;
                history.push(newUrl);
            }
            
            currentIndex++;
            updateDisplay();
        }

        function goBack() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }
    </script>

</body>
</html>
